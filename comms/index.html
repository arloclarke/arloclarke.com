<html lang="en">
<head>
  <meta charset="utf-8" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Arlo Clarke",
    "url": "https://arloclarke.com/",
    "mainEntityOfPage": "https://arloclarke.com/comms/",
    "jobTitle": "Software Engineer",
    "email": "hello@arloclarke.com",
    "sameAs": [
      "https://github.com/arloclarke",
      "https://keybase.io/arloclarke",
      "https://www.linkedin.com/in/arlo-clarke"
    ]
  }
  </script>
  <link href="/assets/fonts/site-fonts.css" rel="stylesheet">
  <style>
    :root {
      --bg: #fffdf8;
      --text: #181612;
      --muted: #726b60;
      --line: rgba(24, 22, 18, .12);
      --hover: rgba(24, 22, 18, .045);
      --max: 760px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: #000; }
    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 34px 24px 56px;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 18px;
      width: 100%;
      padding: 34px max(24px, calc((100% - var(--max)) / 2)) 22px;
      background: var(--bg);
    }
    .name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -.01em;
    }
    nav {
      display: flex;
      gap: 22px;
      color: var(--muted);
      font-size: 14px;
    }
    nav a[aria-current="page"] { color: var(--text); }
    .hero { padding: 118px 0 64px; }
    h1 {
      margin: 0;
      max-width: 680px;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(48px, 9vw, 86px);
      line-height: .96;
      font-weight: 400;
      letter-spacing: -.055em;
    }
    .subhead {
      margin: 26px 0 0;
      max-width: 540px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
      letter-spacing: -.01em;
    }
    .contact-list {
      display: grid;
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--line);
    }
    .contact-list a,
    .copy-email {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 22px;
      width: 100%;
      padding: 22px 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background .16s ease, padding .16s ease;
    }
    .contact-list a:hover,
    .copy-email:hover,
    .copy-email:focus-visible {
      background: var(--hover);
      padding-left: 12px;
      padding-right: 12px;
    }
    .copy-email:focus-visible {
      outline: 1px solid var(--muted);
      outline-offset: 3px;
    }
    .label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .value {
      margin: 0;
      font-family: "Newsreader", Georgia, serif;
      font-size: 27px;
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -.035em;
    }
    .copy-value {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .copy-icon {
      width: 20px;
      height: 20px;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .copy-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      margin-left: 4px;
      padding: 4px 9px 4px 7px;
      border-radius: 999px;
      background: rgba(95, 117, 95, .12);
      color: #4f754f;
      font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: .005em;
      opacity: 0;
      transform: translateY(1px);
      transition: opacity .14s ease;
      white-space: nowrap;
    }
    .copy-status.is-visible {
      opacity: 1;
    }
    .copy-status[data-state="error"] {
      background: rgba(24, 22, 18, .06);
      color: var(--muted);
    }
    .copy-status[data-state="error"] .check-icon {
      display: none;
    }
    .check-icon {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }
    @media (max-width: 620px) {
      .page { padding: 26px 18px 44px; }
      header { padding: 26px 18px 18px; }
      nav { gap: 16px; }
      .hero { padding: 98px 0 52px; }
      .contact-list a,
      .copy-email { grid-template-columns: 1fr; gap: 6px; padding: 20px 0; }
      .contact-list a:hover,
      .copy-email:hover,
      .copy-email:focus-visible { padding-left: 0; padding-right: 0; background: transparent; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <a class="name" href="/comms/">Arlo Clarke</a>
      <nav aria-label="Primary">
        <a href="/notes/">Notes</a>
        <a aria-current="page" href="/comms/">hello@</a>
      </nav>
    </header>

    <section class="hero" aria-labelledby="intro">
      <h1 id="intro">Comms.</h1>
      <p class="subhead">The easiest ways to reach me.</p>
    </section>

    <ul class="contact-list" aria-label="Contact links">
      <li>
        <button class="copy-email" type="button" data-email-user="hello" data-email-domain="arloclarke.com" aria-describedby="copy-email-status">
          <span class="label">Email</span>
          <span>
            <span class="value copy-value">
              <svg class="copy-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <rect x="8" y="8" width="11" height="11" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
              </svg>
              <span class="email-text"><span>hello</span><span>@</span><span>arloclarke.com</span></span>
              <span class="copy-status" id="copy-email-status" aria-live="polite" data-state="success">
                <svg class="check-icon" aria-hidden="true" viewBox="0 0 18 18" fill="none">
                  <circle cx="9" cy="9" r="8" fill="currentColor" opacity=".18"></circle>
                  <path d="M5.2 9.2l2.3 2.3 5.1-5.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span class="copy-status-text"></span>
              </span>
            </span>
          </span>
        </button>
      </li>
      <li>
        <a href="https://www.linkedin.com/in/arlo-clarke" rel="me">
          <span class="label">LinkedIn</span>
          <span class="value">linkedin.com/in/arlo-clarke</span>
        </a>
      </li>
    </ul>

  </main>
  <script>
    (() => {
      const button = document.querySelector('.copy-email');
      const status = document.querySelector('#copy-email-status');
      const statusText = document.querySelector('.copy-status-text');
      if (!button || !status || !statusText) return;

      const email = `${button.dataset.emailUser}@${button.dataset.emailDomain}`;
      let timer;

      const showStatus = (message, state = 'success') => {
        status.dataset.state = state;
        statusText.textContent = message;
        status.classList.add('is-visible');
        clearTimeout(timer);
        timer = setTimeout(() => {
          status.classList.remove('is-visible');
          statusText.textContent = '';
        }, 2200);
      };

      const fallbackCopy = () => {
        const input = document.createElement('textarea');
        input.value = email;
        input.setAttribute('readonly', '');
        input.style.position = 'fixed';
        input.style.top = '0';
        input.style.left = '-9999px';
        document.body.appendChild(input);
        input.focus();
        input.select();
        const copied = document.execCommand('copy');
        input.remove();
        return copied;
      };

      button.addEventListener('click', () => {
        try {
          if (fallbackCopy()) {
            showStatus('Copied email to clipboard.');
            return;
          }

          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(email)
              .then(() => showStatus('Copied email to clipboard.'))
              .catch(() => showStatus('Copy failed. Select the email address and copy it manually.', 'error'));
            return;
          }

          throw new Error('Clipboard unavailable');
        } catch (error) {
          showStatus('Copy failed. Select the email address and copy it manually.', 'error');
        }
      });
    })();
  </script>
</body>
</html>
