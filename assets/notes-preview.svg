<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Notes — Arlo Clarke</title>
  <desc id="desc">A warm minimal Open Graph card for Arlo Clarke's notes landing page.</desc>
  <rect width="1200" height="630" fill="#fffdf8"/>
  <rect x="54" y="54" width="1092" height="522" rx="10" fill="none" stroke="rgba(24,22,18,.14)"/>

  <text x="92" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="86" letter-spacing="-3.8" fill="#181612">Notes</text>
  <text x="96" y="198" font-family="Helvetica Neue, Arial, sans-serif" font-size="25" fill="#726b60">Notes on systems, ideas, and software.</text>

  <g transform="translate(95,255)">
